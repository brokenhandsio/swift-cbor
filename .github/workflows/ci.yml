name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-test:
    name: Test (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  ios-test:
    name: Test (iOS Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Test
        # SwiftPM generates a single scheme named after the package.
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme swift-cbor \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest'

  linux-test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    container: swift:6.3
    steps:
      - uses: actions/checkout@v7
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux-test-no-foundation:
    name: Test (Linux, FoundationSupport disabled)
    runs-on: ubuntu-latest
    container: swift:6.3
    steps:
      - uses: actions/checkout@v7
      # Guards against re-introducing a hard Foundation dependency in the core
      # library. The Data-specific Codable test compiles out under this trait.
      - name: Build (traits disabled)
        run: swift build --disable-default-traits
      - name: Test (traits disabled)
        run: swift test --disable-default-traits

  linux-benchmark:
    name: Benchmarks (Linux)
    runs-on: ubuntu-latest
    container: swift:6.3
    env:
      CBOR_BENCHMARK: "1" # wire up the (otherwise-gated) benchmark target
    steps:
      - uses: actions/checkout@v7
      - name: Run benchmarks
        run: swift package --disable-sandbox benchmark

  docs:
    name: DocC archive
    runs-on: ubuntu-latest
    container: swift:6.3
    env:
      CBOR_DOCC: "1" # wire up the (otherwise-gated) swift-docc-plugin
    steps:
      - uses: actions/checkout@v7
      - name: Build documentation archive
        run: swift package generate-documentation --target CBOR
      - name: Package archive
        # DocC output contains files with ':' in their names (e.g. operator pages),
        # which upload-artifact rejects. Tar the archive into a single file first.
        run: tar -C .build/plugins/Swift-DocC/outputs -czf CBOR.doccarchive.tgz CBOR.doccarchive
      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: CBOR-doccarchive
          path: CBOR.doccarchive.tgz
